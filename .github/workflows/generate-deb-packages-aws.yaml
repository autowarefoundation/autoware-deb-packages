
name: generate-deb-packages-aws

on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - 'main'

jobs:
  generate-debian-packages:
    name: "Generate Debian packages"
    uses: ./.github/workflows/generate-deb-packages-aws-reusable.yaml
    with:
      is-cuda-job: false
    secrets:
      aws-access-key-id: ${{ secrets.EC2_ON_DEMAND_AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.EC2_ON_DEMAND_AWS_SECRET_ACCESS_KEY }}
      aws-region: ${{ secrets.EC2_ON_DEMAND_AWS_REGION }}
      gh-personal-access-token-mfc: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN_MFC }}
